name: GatherPress Nightly Build

on:
  schedule:
    # Runs at 00:00 UTC everyday
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    name: Build Release Artifact
    runs-on: ubuntu-latest
    outputs:
      commit_hash: ${{ steps.get_hash.outputs.hash }}
      gatherpress_version: ${{ steps.get_version.outputs.version }}
      nightly_version: ${{ steps.build_version_string.outputs.nightly_version }}
      tag_exists: ${{ steps.check_tag.outputs.exists }}

    steps:
      - name: Checkout GatherPress repository
        uses: actions/checkout@v6
        with:
          repository: GatherPress/gatherpress
          ref: refs/heads/develop

      - name: Get commit hash
        id: get_hash
        run: echo "hash=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Get GatherPress version
        id: get_version
        run: |
          echo "version=$(sed -n '/Version: /p' gatherpress.php | awk '{print $3}')" >> $GITHUB_OUTPUT

      - name: Build version string
        id: build_version_string
        run: |
          echo "nightly_version=vnightly-${{ steps.get_version.outputs.version }}-${{ steps.get_hash.outputs.hash }}" >> $GITHUB_OUTPUT

      - name: Check if nightly tag already exists
        id: check_tag
        run: |
          TAG="${{ steps.build_version_string.outputs.nightly_version }}"
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "exists='true'" >> "$GITHUB_OUTPUT"
          else
            echo "exists='false'" >> "$GITHUB_OUTPUT"
          fi

      - name: Set Nightly Version
        if: ${{ steps.check_tag.outputs.exists != 'true' }}
        run: |
          sed -i "s/Version: .*/Version: ${{ steps.build_version_string.outputs.nightly_version }}/g" gatherpress.php

      - name: Setup PHP
        if: ${{ steps.check_tag.outputs.exists != 'true' }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: latest
          coverage: none
          tools: wp-cli

      - name: Install dist-archive-command
        if: ${{ steps.check_tag.outputs.exists != 'true' }}
        run: |
          # shivammathur/setup-php stores a GitHub OAuth token in Composer's
          # global auth config; wp-cli's bundled Composer rejects its format
          # ("invalid characters"), breaking this install. dist-archive-command
          # is public, so drop the token and install unauthenticated.
          composer config --global --unset github-oauth.github.com 2>/dev/null || true
          rm -f "$HOME/.config/composer/auth.json" "$HOME/.composer/auth.json" "$HOME/.wp-cli/packages/auth.json" 2>/dev/null || true
          wp package install wp-cli/dist-archive-command:^2

      - name: Install NodeJS
        if: ${{ steps.check_tag.outputs.exists != 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          # Enable built-in functionality for caching and restoring dependencies, which is disabled by default.
          # The actions/setup-node uses actions/cache under the hood.
          # https://github.com/actions/setup-node#caching-global-packages-data
          cache: 'npm'

      - name: NPM install
        if: ${{ steps.check_tag.outputs.exists != 'true' }}
        run: npm ci

      - name: Build plugin
        if: ${{ steps.check_tag.outputs.exists != 'true' }}
        # - [Incorrect version number used when creating zip archive · Issue #92 · wp-cli/dist-archive-command](https://github.com/wp-cli/dist-archive-command/issues/92)
        run: |
          npm run build
          wp dist-archive . ./gatherpress.zip

      - name: Upload artifact
        if: ${{ steps.check_tag.outputs.exists != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: gatherpress-plugin
          path: ./gatherpress.zip

  release:
    name: Create Release
    needs: build
    if: ${{ needs.build.outputs.tag_exists != 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure Git
        run: |
          git config user.name GatherPress
          git config user.email "gatherpressnightlies@users.noreply.github.com"

      - name: Update previous-releases.txt
        run: |
          git config --global user.name GatherPress
          git config pull.rebase true
          git pull origin HEAD
          printf "${{ needs.build.outputs.nightly_version }}\n" >> previous-releases.txt
          git add previous-releases.txt
          git commit -m "Add ${{ needs.build.outputs.nightly_version }} to previous-releases.txt"
          git push origin HEAD
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Git Tag
        run: |
          git tag ${{ needs.build.outputs.nightly_version }}
          git push origin ${{ needs.build.outputs.nightly_version }}

      - name: Create Release
        id: create_release
        run: |
          response=$(curl \
            -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -d '{
              "tag_name": "${{ needs.build.outputs.nightly_version }}",
              "name": "GatherPress Nightly ${{ needs.build.outputs.nightly_version }}",
              "body": "Nightly build of the GatherPress plugin created from https://github.com/GatherPress/gatherpress/commit/${{ needs.build.outputs.commit_hash }}.",
              "draft": false,
              "prerelease": false
            }' \
            https://api.github.com/repos/${{ github.repository }}/releases)
           upload_url=$(echo "$response" | jq -r '.upload_url')
           echo "UPLOAD_URL=$upload_url" >> $GITHUB_OUTPUT

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: gatherpress-plugin

      - name: Upload Release Asset
        id: upload-release-asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.UPLOAD_URL }}
          asset_path: ./gatherpress.zip
          asset_name: gatherpress-nightly.zip
          asset_content_type: application/zip